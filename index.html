<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>SCP — Sistema de Controle de Presença</title>
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="Sistema de Controle de Presença — GPS Mecanizada" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/topbar.css" />
    <link rel="stylesheet" href="css/attendance.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/modal.css" />
</head>

<body>
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen" class="hidden">
        <canvas id="bg-canvas"></canvas>
        <div id="vignette"></div>

        <div class="login-box" style="z-index: 10; position: relative;">
            <div class="login-header">
                <div class="login-icon">
                    <svg fill="none" stroke="#1e40af" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h1>Controle de Presença</h1>
                <p>GPS Mecanizada — Gestão Profissional</p>
            </div>

            <form id="login-form">
                <div class="login-input-group" id="group-name" style="display: none;">
                    <label>Nome</label>
                    <input type="text" id="login-name" autocomplete="name" />
                </div>
                <div class="login-input-group">
                    <label>E-mail</label>
                    <input type="email" id="login-user" required autocomplete="username" />
                </div>
                <div class="login-input-group">
                    <label>Senha</label>
                    <input type="password" id="login-pass" required autocomplete="current-password" />
                </div>
                <button type="submit" class="login-btn" id="login-submit">Entrar</button>
                <div style="text-align: center; margin-top: 12px; font-size: 13px;">
                    <a href="#" id="toggle-register"
                        style="color: var(--accent); text-decoration: none; font-weight: 600;">Criar uma conta</a>
                </div>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>

        <div class="login-footer">Desenvolvido por Warlison Abreu</div>
    </div>

    <div id="app">

        <!-- ==================== LOADING SCREEN ==================== -->
        <div id="loading-screen" style="background:var(--bg-0)">
            <div class="loading-content">
                <div class="loading-bar-container">
                    <div class="loading-bar"></div>
                </div>
                <div id="loading-status"
                    style="color:var(--text-3); font-size:12px; font-weight:500; margin-top:14px; text-align:center; letter-spacing:0.02em;">
                    Conectando...</div>
            </div>
        </div>

        <!-- ==================== SYNC BAR ==================== -->
        <div id="global-sync-bar"></div>

        <!-- ==================== TOPBAR ==================== -->
        <div id="topbar">
            <div class="logo" id="logo-home" title="Voltar ao Início">
                <span>Grupo GPS</span>
                <span>Mecanizada</span>
                <span>Controle De Presença</span>
            </div>

            <!-- Hamburger Button (Mobile Only) -->
            <button id="mobile-menu-btn" aria-label="Abrir Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div id="nav" class="nav-items">
                <button class="nav-btn" data-view="attendance">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path
                            d="M9 5H7a2 2 0 00-2 2v6a2 2 0 002 2h6a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h0a2 2 0 002-2M9 5a2 2 0 012-2h0a2 2 0 012 2" />
                    </svg>
                    Presença
                </button>
                <button class="nav-btn" data-view="dashboard">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="1" y="1" width="5" height="7" rx="1" />
                        <rect x="1" y="10" width="5" height="5" rx="1" />
                        <rect x="8" y="1" width="7" height="5" rx="1" />
                        <rect x="8" y="8" width="7" height="7" rx="1" />
                    </svg>
                    Dashboard
                </button>
            </div>

            <div id="topbar-right">
                <!-- Injected by auth.js -->
                <div id="topbar-user"></div>

                <div class="stats-pill">Total: <strong id="stat-total">—</strong></div>
                <div class="stats-pill">Marcados: <strong id="stat-marked">—</strong></div>
                <button id="refresh-btn" title="Recarregar dados">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M2 8a6 6 0 0111.47-2.4M14 8A6 6 0 012.53 10.4" />
                        <path d="M14 2v4h-4M2 14v-4h4" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- ==================== MAIN CONTENT ==================== -->
        <div id="main">

            <!-- ATTENDANCE VIEW -->
            <div id="attendance-view" class="view">
                <div id="attendance-content"></div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard-view" class="view">
                <div id="dash-header" class="dash-header"></div>
                <div id="dash-filters" class="dash-filters"></div>
                <div id="dashboard-content"></div>
            </div>

        </div>

        <!-- ==================== TOAST ==================== -->
        <div id="toast-container"></div>

        <!-- ==================== LOADING OVERLAY ==================== -->
        <div id="loading-overlay" class="hidden">
            <div class="loader-box">
                <div class="spinner"></div>
                <p>Carregando...</p>
            </div>
        </div>

    </div>

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- JS Modules (order matters — dependencies first) -->
    <script src="js/config.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
